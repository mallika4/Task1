<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="./login.html">
        <input type="text" placeholder="enter name" name="name" required/><br/>
        <input type="email" placeholder="enter email" name="email" required/><br/>
        <input type="password" placeholder="enter password" name="password" required/><br/>
        <input type="confirm password" placeholder="enter confirm password" name="confirm password" required/><br/>
        <input type="phone number" placeholder="enter phone number" name="phone number" required/>
        <div>
            <input type="radio"  name="gender" id="gmale">
            <label for="gmale">Male</label>
            <input type="radio" id="gfemale" name="gender">
            <label for="gfemale">Female</label>
        </div>
        <div>
            <input type="checkbox" value="10th"/> 10th
            <input type="checkbox" value="Inter"/> Inter
            <input type="checkbox" value="Diploma"/> Diploma
            <input type="checkbox" value="B.tech"/> B.tech
        </div>
        <select>
            <option value="">select your city</option>
            <option value="Guntur">Guntur</option>
            <option value="Vijayawada">Vijayawada</option>
            <option value="vizag">Vizag</option>
        </select><br/>
        <input type="address" placeholder="enter your address" name="address"/><br/><br/>
        <button>Register</button>
    </form>
</body>
</html>
